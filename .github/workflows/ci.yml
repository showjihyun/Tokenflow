name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (${{ matrix.os }} · py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: backend
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      - name: Create venv + install
        run: |
          uv venv --python ${{ matrix.python }}
          uv pip install -e ".[dev]"

      - name: Ruff
        run: uv run ruff check tokenflow tests

      - name: Mypy --strict
        run: uv run mypy tokenflow tests

      - name: Pytest
        run: uv run pytest -q --durations=10

  frontend:
    name: Frontend (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: Vitest
        run: npm test

      - name: Build
        run: npm run build

  wheel:
    name: Wheel build + install smoke
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build wheel
        working-directory: backend
        run: |
          uv python install 3.11
          uv venv
          uv pip install build
          uv run python -m build --wheel

      - name: Install wheel into a clean venv + sanity-check CLI
        run: |
          uv venv /tmp/tf-smoke --python 3.11
          /tmp/tf-smoke/bin/pip install backend/dist/tokenflow-*.whl
          /tmp/tf-smoke/bin/tokenflow --help
          /tmp/tf-smoke/bin/tokenflow init

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: tokenflow-wheel
          path: backend/dist/*.whl
          retention-days: 14
